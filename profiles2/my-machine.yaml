machine:
  id: my-machine
  hostname: archiso
  uefi: true
  secure_boot: disabled

cpu:
  vendor: authenticamd
  ucode_pkg: amd-ucode

gpu:
  driver: amdgpu
  opengl_vendor: AMD

storage:
  disk: <DISK_DEVICE>
  wipe_strategy: format-full
  purge_snapshots: true
  partitions:
    efi:
      device: <EFI_PARTITION>
      fstype: vfat
      mount: /efi
      preserve: true
    root_pool:
      device: <ROOT_PARTITION>
      fstype: ext4
      preserve: false
      subvolumes:

bootloader:
  type: grub
  target: x86_64-efi
  efi_directory: /efi
  bootloader_id: ARCHLINUX
  os_prober: true

kernel:
  pkg: linux-zen
  cmdline: "rw rootflags=subvol=@ loglevel=3 quiet resume=UUID= resume_offset= rtc_cmos.use_acpi_alarm=1"
  hooks:
    - base
    - systemd
    - autodetect
    - microcode
    - modconf
    - kms
    - keyboard
    - keymap
    - sd-vconsole
    - block
    - resume
    - filesystems

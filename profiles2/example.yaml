# =============================================================================
# Profile Template: Example Machine
# =============================================================================
# Copy this file and customize it for your hardware:
#   cp profiles/example.yaml profiles/my-machine.yaml
#
# Then edit the placeholders below.
# NEVER commit real profiles to git — they contain hardware-specific data.
# =============================================================================

machine:
  id: my-machine                 # Unique identifier for this profile
  hostname: archbox              # Target hostname
  uefi: true                     # true for UEFI, false for legacy BIOS
  secure_boot: disabled

cpu:
  vendor: amd                    # amd or intel
  ucode_pkg: amd-ucode           # amd-ucode or intel-ucode

gpu:
  driver: amdgpu                 # amdgpu, i915, nouveau, nvidia, etc.
  opengl_vendor: AMD

storage:
  disk: /dev/nvme0n1             # Top-level block device
  wipe_strategy: subvol-reset    # subvol-reset or format-full
  purge_snapshots: true          # Wipe @snapshots during reset?
  partitions:
    efi:
      device: /dev/nvme0n1p1     # EFI partition (usually vfat)
      fstype: vfat
      mount: /efi
      preserve: true             # NEVER format this partition
    root_pool:
      device: /dev/nvme0n1p2     # BTRFS partition
      fstype: btrfs
      preserve: true             # Keep partition, reset subvolumes only
      subvolumes:
        - name: "@"
          mount: "/"
          reset: true            # This subvolume is wiped during install
          options: ""
        - name: "@home"
          mount: "/home"
          reset: false           # Preserved
          options: ""
        - name: "@swap"
          mount: "/.swap"
          reset: false           # Preserved (contains swapfile)
          options: "nodatacow,compress=no"
        - name: "@snapshots"
          mount: "/.snapshots"
          reset: true
          options: ""

bootloader:
  type: grub                     # grub or systemd-boot
  target: x86_64-efi
  efi_directory: /efi
  bootloader_id: ARCHLINUX
  os_prober: true                # Enable to detect Windows/other OSes

kernel:
  pkg: linux-zen
  # IMPORTANT: Replace UUID and resume_offset with YOUR values from /etc/fstab or /proc/cmdline
  cmdline: "rw rootflags=subvol=@ loglevel=3 quiet resume=UUID=YOUR-DISK-UUID resume_offset=YOUR-OFFSET"
  hooks:
    - base
    - systemd
    - autodetect
    - microcode
    - modconf
    - kms
    - keyboard
    - keymap
    - sd-vconsole
    - block
    - resume
    - filesystems
    - fsck

software:
  base_packages:
    # --- Base + Boot ---
    - base
    - base-devel
    - linux-zen
    - linux-zen-headers
    - amd-ucode
    - grub
    - efibootmgr
    - os-prober
    - grub-btrfs
    - inotify-tools
    - mkinitcpio
    # --- BTRFS + Storage ---
    - btrfs-progs
    - timeshift
    # --- Network ---
    - networkmanager
    - iwd
    - wireguard-tools
    - openssh
    # --- Audio ---
    - pipewire
    - pipewire-alsa
    - pipewire-pulse
    - pipewire-jack
    - wireplumber
    - pamixer
    # --- Bluetooth ---
    - bluez
    - bluez-utils
    # --- Power / Laptop ---
    - tlp
    - acpi_call
    - brightnessctl
    - upower
    # --- Sway / Wayland core ---
    - sway
    - swaybg
    - swayidle
    - swaylock
    - wlroots
    - wayland
    - wayland-protocols
    - xorg-xwayland
    # --- Display manager ---
    - sddm
    # --- Terminal ---
    - ghostty
    - foot
    # --- Launcher / Bar ---
    - waybar
    - rofi-wayland
    - wofi
    # --- Notifications ---
    - dunst
    - libnotify
    # --- File manager ---
    - thunar
    - gvfs
    - udiskie
    # --- Fonts ---
    - terminus-font
    - ttf-terminus-nerd
    - noto-fonts
    - noto-fonts-emoji
    # --- Themes / Cursors ---
    - capitaine-cursors
    - vimix-cursors
    - xcursor-themes
    - xcursor-vanilla-dmz-aa
    # --- Shell / Tools ---
    - zsh
    - zsh-completions
    - git
    - vim
    - neovim
    - htop
    - btop
    - mc
    - ranger
    - ripgrep
    - fd
    - fzf
    - bat
    - eza
    - zoxide
    - tmux
    # --- Browsers ---
    - firefox
    # --- Media ---
    - mpv
    - imv
    - grim
    - slurp
    - wl-clipboard
    - playerctl
    # --- Dev tools ---
    - go
    - rust
    - nodejs
    - npm
    - python
    - python-pip
    - docker
    # --- Sway utilities ---
    - wob
    - wlogout
    - swayr
    - autotiling
    - gammastep
    - polkit-gnome
    - gnome-keyring
    - libsecret
    # --- Misc ---
    - xdg-desktop-portal
    - xdg-desktop-portal-wlr
    - xdg-user-dirs
    - qt5ct
    - qt6ct
    - nwg-look
    - papirus-icon-theme

  aur_packages:
    - yay
    - zsh-antidote
    - timeshift-autosnap

  services:
    system:
      - acpid
      - avahi-daemon
      - bluetooth
      - cronie
      - NetworkManager
      - sddm
      - systemd-timesyncd
      - grub-btrfsd
      - tlp
      - docker

  aur_helper: yay

desktop:
  session: sway
  display_manager: sddm
  scale: 1.5
  output: eDP-1
  resolution: 2880x1800
  refresh_rate: 120

dotfiles:
  manager: chezmoi
  repo: ""                     # <-- SET THIS: https://github.com/YOU/dotfiles.git
  branch: main

security:
  known_hashes: []             # <-- Populated automatically by 01-inspect / 02-generate-profile
